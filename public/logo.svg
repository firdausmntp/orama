<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background Drop Shadow (Brutalist style) -->
  <rect x="32" y="32" width="448" height="448" rx="64" fill="#1A1A1A" />
  
  <!-- Main Orange Container -->
  <rect x="16" y="16" width="448" height="448" rx="64" fill="#FF5F15" stroke="#1A1A1A" stroke-width="24" />
  
  <!-- Accent Dots (Top Right, Bottom Left) -->
  <circle cx="410" cy="70" r="16" fill="#F4F4F5" stroke="#1A1A1A" stroke-width="12" />
  <circle cx="70" cy="410" r="16" fill="#F4F4F5" stroke="#1A1A1A" stroke-width="12" />

  <!-- Dotted Scanning Circle / Crosshairs -->
  <circle cx="240" cy="240" r="140" fill="none" stroke="#1A1A1A" stroke-width="8" stroke-dasharray="16 16" />
  <line x1="240" y1="60" x2="240" y2="100" stroke="#1A1A1A" stroke-width="16" stroke-linecap="round" />
  <line x1="240" y1="380" x2="240" y2="420" stroke="#1A1A1A" stroke-width="16" stroke-linecap="round" />
  <line x1="60" y1="240" x2="100" y2="240" stroke="#1A1A1A" stroke-width="16" stroke-linecap="round" />
  <line x1="380" y1="240" x2="420" y2="240" stroke="#1A1A1A" stroke-width="16" stroke-linecap="round" />

  <!-- The Letter "O" -->
  <circle cx="240" cy="240" r="64" fill="none" stroke="#1A1A1A" stroke-width="48" />
  
  <!-- "ORAMA" text overlay in bottom right corner -->
  <g transform="translate(190, 410)">
    <rect x="-10" y="-36" width="220" height="48" fill="#1A1A1A" />
    <text x="100" y="-3" font-family="monospace, 'Courier New', Courier, sans-serif" font-weight="900" font-size="32" fill="#FF5F15" text-anchor="middle" letter-spacing="4">ORAMA.VISION</text>
  </g>
</svg>